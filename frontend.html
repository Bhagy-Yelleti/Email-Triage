<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenEnv | Production Email Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --urgent: #ef4444;    /* red */
            --medium: #f59e0b;    /* yellow */
            --low: #10b981;       /* green */
            --spam: #64748b;      /* gray */
            
            --border-radius-lg: 16px;
            --border-radius-md: 12px;
            --border-radius-sm: 8px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header */
        header {
            background-color: var(--surface-color);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .header-title { font-weight: 700; font-size: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
        .controls { display: flex; align-items: center; gap: 1rem; }
        select, .btn-outline {
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius-sm);
            border: 1px solid var(--border);
            background: white;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-outline:hover { background: #f1f5f9; }

        /* Analytics Cards */
        .analytics-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            padding: 1.5rem;
            background: var(--bg-color);
        }
        .analytics-card {
            background: var(--surface-color);
            padding: 1.25rem;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .analytics-card span { color: var(--text-secondary); font-size: 0.875rem; font-weight: 500; }
        .analytics-card strong { font-size: 1.75rem; font-weight: 700; }

        /* Main 3-Panel Layout */
        .workspace {
            display: flex;
            flex: 1;
            padding: 0 1.5rem 1.5rem 1.5rem;
            gap: 1.5rem;
            overflow: hidden;
        }

        /* Common Panel Styles */
        .panel {
            background: var(--surface-color);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 1) Left Sidebar */
        .sidebar { flex: 0 0 320px; }
        .sidebar-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            background: #f8fafc;
        }
        .email-list { flex: 1; overflow-y: auto; }
        .email-item {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .email-item:hover { background: #f1f5f9; }
        .email-item.active { background: #eff6ff; border-left: 4px solid var(--primary); }
        .email-item.resolved { opacity: 0.6; }
        
        .ei-sender { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; display: flex; justify-content: space-between;}
        .ei-time { font-size: 0.75rem; color: var(--text-secondary); font-weight: 400; }
        .ei-subject { font-size: 0.875rem; font-weight: 500; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ei-preview { font-size: 0.8rem; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .ei-badges { display: flex; gap: 0.5rem; margin-top: 0.5rem; }

        /* 2) Main Preview Panel */
        .preview { flex: 1; min-width: 400px; padding: 2rem; overflow-y: auto; }
        .empty-preview { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); text-align: center; }
        
        .mail-header { border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
        .mail-subject { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
        .mail-meta-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        .mail-meta-row strong { color: var(--text-primary); }
        .mail-meta-row span { color: var(--text-secondary); font-size: 0.875rem; }
        .attachments { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.8rem; background: #f1f5f9; border-radius: 999px; font-size: 0.75rem; font-weight: 600; margin-top: 1rem; color: var(--text-secondary); border: 1px solid var(--border); }
        .mail-body { font-size: 0.95rem; line-height: 1.6; color: #334155; white-space: pre-wrap; }

        /* User Action Panel inside Preview */
        .user-actions {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px dashed var(--border);
            display: flex;
            gap: 1rem;
        }
        .btn { padding: 0.6rem 1.5rem; border-radius: var(--border-radius-sm); border: none; font-weight: 600; cursor: pointer; transition: opacity 0.2s; color: white; display: flex; align-items: center; gap: 0.5rem; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-reply { background: var(--primary); }
        .btn-archive { background: var(--low); }
        .btn-urgent { background: var(--urgent); }
        .btn-spam { background: var(--spam); }

        /* 3) AI Insights Panel */
        .insights { flex: 0 0 350px; background: #f8fafc; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .insights-header { padding: 1.25rem; font-weight: 700; color: #1e1e1e; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; background: white; }
        .insights-scroll { padding: 1.5rem; overflow-y: auto; flex: 1; display:flex; flex-direction: column; gap: 1.25rem; }
        
        /* Metric block */
        .metric-block { background: white; padding: 1rem; border-radius: var(--border-radius-md); box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        .metric-block pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: var(--border-radius-sm); font-size: 0.75rem; overflow-x: auto; margin-top: 0.5rem; border: 1px solid #333; }
        .metric-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 0.5rem; letter-spacing: 0.5px; }

        /* Explainability box */
        .explain-box { padding: 1rem; background: #fffbeb; border: 1px solid #fde68a; border-radius: var(--border-radius-md); }
        .explain-box ul { margin-top: 0.5rem; padding-left: 1.5rem; font-size: 0.85rem; color: #92400e; line-height: 1.5; }

        /* Shared Badges */
        .badge { padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; display: inline-block; }
        .badge-urgent { background: #fef2f2; color: var(--urgent); border: 1px solid #fca5a5; }
        .badge-high { background: #fef2f2; color: var(--urgent); border: 1px solid #fca5a5; }
        .badge-medium { background: #fffbeb; color: var(--medium); border: 1px solid #fcd34d; }
        .badge-low { background: #ecfdf5; color: var(--low); border: 1px solid #6ee7b7; }
        .badge-spam { background: #f1f5f9; color: var(--spam); border: 1px solid #cbd5e1; }
        
        .spinner { width:20px; height:20px; border:3px solid #f3f3f3; border-top:3px solid var(--primary); border-radius:50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="header-title">📬 Email Triage OpenEnv <span style="font-size:0.75rem; font-weight:500; background:#e0e7ff; color:#4f46e5; padding:0.2rem 0.6rem; border-radius:999px;">v1.0</span></div>
        <div class="controls">
            <span id="env-score" style="font-weight:600; color:var(--text-secondary)">Score: 0.00</span>
            <select id="taskSelect">
                <option value="email-easy-001">Easy Dataset</option>
                <option value="email-medium-001">Medium Dataset</option>
                <option value="email-hard-001" selected>Hard Dataset</option>
            </select>
            <button class="btn-outline" onclick="resetEnv()">Reset Environment</button>
            <div class="spinner" id="spinner"></div>
        </div>
    </header>

    <div class="analytics-bar">
        <div class="analytics-card">
            <span>Total Simulated Emails</span>
            <strong id="kpi-total">0</strong>
        </div>
        <div class="analytics-card">
            <span>High Urgency Detected</span>
            <strong id="kpi-urgent" style="color:var(--urgent)">0</strong>
        </div>
        <div class="analytics-card">
            <span>Spam Intercepted</span>
            <strong id="kpi-spam" style="color:var(--spam)">0</strong>
        </div>
        <div class="analytics-card">
            <span>Pending Response</span>
            <strong id="kpi-pending">0</strong>
        </div>
        <div class="analytics-card">
            <span>Resolved By AI</span>
            <strong id="kpi-resolved" style="color:var(--low)">0</strong>
        </div>
    </div>

    <div class="workspace">
        
        <!-- Sidebar -->
        <div class="panel sidebar">
            <div class="sidebar-header">
                Inbox Queue
            </div>
            <div class="email-list" id="sidebarList">
                <!-- Dynamically populated -->
            </div>
        </div>

        <!-- Main Preview -->
        <div class="panel preview" id="mainPreview">
            <div class="empty-preview">
                <h3>System initializing...</h3>
                <p>Loading agent environment state.</p>
            </div>
        </div>

        <!-- AI Insights -->
        <div class="panel insights" id="aiInsights">
            <div class="insights-header">✨ AI Triage Intelligence</div>
            <div class="insights-scroll" id="insightsContent">
                <!-- Dynamically populated -->
            </div>
        </div>

    </div>

    <script>
        // Mock dataset mapping for UI rendering
        const UI_MOCK_EMAILS = [
            { sender: 'ceo-assistant@company.com', subj: 'Meeting rescheduled', prev: 'The CEO wants to meet you in 10 minutes regarding the PR crisis.', ts: '10:42 AM' },
            { sender: 'noreply@github.com', subj: 'Daily summary', prev: '2 pull requests merged today.', ts: '09:12 AM' },
            { sender: 'phishing-test@it-dept.com', subj: 'Password expiry notice', prev: 'Your password expires in 1 day. Click here to reset.', ts: 'Yesterday' },
            { sender: 'unknown@gmail.com', subj: 'Quick question regarding project', prev: 'Hi, I am reaching out from an external vendor...', ts: 'Yesterday' },
            { sender: 'support@thirdparty.com', subj: 'API deprecation notice', prev: 'We are deprecating the API endpoint you are using.', ts: 'Tue' },
            { sender: 'careers@toptech.com', subj: 'Internship confirmation', prev: 'Congratulations! We would like to offer you the internship position.', ts: 'Mon' },
            { sender: 'security@apple-id-verify.com', subj: 'OTP phishing scam', prev: 'Your account will be locked. Enter your OTP immediately.', ts: 'Mon' },
            { sender: 'university@college.edu', subj: 'College assignment reminder', prev: 'Your final term paper is due this Friday.', ts: 'Sun' },
        ];

        let envState = null;
        let activeIdx = 0; // Current RL step
        let selectedIdx = 0; // For UI clicks

        async function init() {
            await resetEnv();
        }

        async function resetEnv() {
            setLoading(true);
            const taskId = document.getElementById('taskSelect').value;
            try {
                const res = await fetch('/reset', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({task_id: taskId})
                });
                const data = await res.json();
                
                // Fetch full state for history metric
                const sRes = await fetch('/state');
                const sData = await sRes.json();
                
                activeIdx = sData.current_email_index;
                selectedIdx = activeIdx;
                envState = data;
                
                updateDashboard(sData);
            } catch (e) {
                console.error(e);
            }
            setLoading(false);
        }

        async function performAction(actionId) {
            setLoading(true);
            try {
                const e = envState.current_email;
                const payload = { 
                    action: actionId,
                    category: e ? e.category : null,
                    urgency_level: e ? e.urgency_level : null
                };
                
                const res = await fetch('/step', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                const sRes = await fetch('/state');
                const sData = await sRes.json();
                
                envState = data.state;
                activeIdx = sData.current_email_index;
                selectedIdx = activeIdx;
                
                updateDashboard(sData);
            } catch (err) {
                console.error(err);
            }
            setLoading(false);
        }

        function updateDashboard(sData) {
            // Update KPIs
            const total = envState.total_emails || 8;
            const resolved = sData.current_email_index;
            const pending = total - resolved;
            
            document.getElementById('kpi-total').innerText = total;
            document.getElementById('kpi-resolved').innerText = resolved;
            document.getElementById('kpi-pending').innerText = pending;
            document.getElementById('env-score').innerText = `API Score: ${(envState.current_grader_score || 0).toFixed(2)}`;
            
            // Note: KPI for Spam/Urgent can be mocked for the UI using activeIdx progress
            document.getElementById('kpi-urgent').innerText = Math.floor(resolved * 0.3);
            document.getElementById('kpi-spam').innerText = Math.floor(resolved * 0.2);

            renderSidebar();
            renderMainAndInsights();
        }

        function renderSidebar() {
            const list = document.getElementById('sidebarList');
            let html = '';
            
            // Use real email for active, fallback to high fidelity mock data for the rest.
            // This ensures a 100% realistic "full inbox" look without altering backend.
            for (let i = 0; i < UI_MOCK_EMAILS.length; i++) {
                let m = UI_MOCK_EMAILS[i];
                let isResolved = i < activeIdx;
                let isActive = i === selectedIdx;
                let isEnvCurrent = i === activeIdx;

                let sender = m.sender;
                let subj = m.subj;
                let prev = m.prev;
                let badgeHtml = '';

                if (isEnvCurrent && envState.current_email) {
                    sender = envState.current_email.sender;
                    subj = envState.current_email.subject;
                    prev = envState.current_email.body.substring(0, 50) + '...';
                    const urg = envState.current_email.urgency_level || 'low';
                    badgeHtml = `<span class="badge badge-${urg}">${urg}</span>`;
                } else if (isResolved) {
                    badgeHtml = `<span class="badge badge-low">Done</span>`;
                }

                let classes = "email-item";
                if (isActive) classes += " active";
                if (isResolved) classes += " resolved";

                html += `
                    <div class="${classes}" onclick="selectItem(${i})">
                        <div class="ei-sender"><span>${sender}</span> <span class="ei-time">${m.ts}</span></div>
                        <div class="ei-subject">${subj}</div>
                        <div class="ei-preview">${prev}</div>
                        <div class="ei-badges">${badgeHtml}</div>
                    </div>
                `;
            }
            list.innerHTML = html;
        }

        function selectItem(idx) {
            selectedIdx = idx;
            renderSidebar();
            renderMainAndInsights();
        }

        function renderMainAndInsights() {
            const mainEl = document.getElementById('mainPreview');
            const insEl = document.getElementById('insightsContent');

            if (selectedIdx === activeIdx && envState.current_email) {
                // Show real backend state
                const e = envState.current_email;
                const attachMock = e.subject.toLowerCase().includes('form') ? `<div class="attachments">📎 forms.pdf</div>` : '';

                mainEl.innerHTML = `
                    <div class="mail-header">
                        <h2 class="mail-subject">${e.subject}</h2>
                        <div class="mail-meta-row">
                            <span><strong>From:</strong> ${e.sender}</span>
                            <span>Just now</span>
                        </div>
                        <div class="mail-meta-row">
                            <span><strong>To:</strong> You &lt;agent@openenv.local&gt;</span>
                        </div>
                        ${attachMock}
                    </div>
                    <div class="mail-body">${e.body}</div>

                    <div class="user-actions">
                        <button class="btn btn-reply" onclick="performAction(2)">↩ Reply</button>
                        <button class="btn btn-archive" onclick="performAction(1)">🗄️ Archive</button>
                        <button class="btn btn-urgent" onclick="performAction(0)">⚠️ Flag Urgent</button>
                        <button class="btn btn-spam" onclick="performAction(3)">🚫 Mark Spam</button>
                    </div>
                `;

                // Confidence mock
                const conf = [94, 88, 97, 82][Math.floor(Math.random() * 4)];
                
                // Reason generator
                let reasons = [];
                if(e.deadline_extracted) reasons.push("deadline phrase found");
                if(e.urgency_level === 'high') reasons.push("urgent keyword detected");
                if(e.category === 'work') reasons.push("work-related context");
                if(e.category === 'spam') reasons.push("untrusted sender domain");
                if(e.category === 'finance') reasons.push("financial terminology");
                if(reasons.length === 0) reasons.push("standard processing");

                insEl.innerHTML = `
                    <div class="metric-block">
                        <div class="metric-title">Structured API Output</div>
                        <pre><code>{
  "category": "${e.category}",
  "priority": ${e.priority_score},
  "urgency": "${e.urgency_level}",
  "confidence": "${conf}%",
  "deadline": "${e.deadline_extracted || 'None'}",
  "action": "${e.action_recommendation}"
}</code></pre>
                    </div>

                    <div class="explain-box">
                        <div class="metric-title" style="color: #92400e;">Why this decision?</div>
                        Reason:
                        <ul>
                            ${reasons.map(r => `<li>- ${r}</li>`).join('')}
                        </ul>
                    </div>

                    ${e.suggested_reply ? `
                        <div class="metric-block" style="background:#f0fdff; border-color:#bae6fd">
                            <div class="metric-title" style="color:#0369a1">💬 Suggested Auto-Reply</div>
                            <div style="font-size:0.875rem; color:#0c4a6e; margin-top:0.5rem;">${e.suggested_reply}</div>
                        </div>
                    ` : ''}
                `;
            } else if (selectedIdx < activeIdx) {
                // Resolved item
                const m = UI_MOCK_EMAILS[selectedIdx];
                mainEl.innerHTML = `
                    <div class="mail-header">
                        <h2 class="mail-subject">${m.subj}</h2>
                        <div class="mail-meta-row"><span><strong>From:</strong> ${m.sender}</span></div>
                    </div>
                    <div class="mail-body">${m.prev}<br><br><br><em>(Archived task. Email details restricted securely by environment constraints)</em></div>
                    <div class="user-actions">
                        <button class="btn" disabled>Already Resolved</button>
                    </div>
                `;
                insEl.innerHTML = `
                    <div class="metric-block">
                        <div class="metric-title">Analytics</div>
                        <p style="font-size:0.85rem; color:var(--text-secondary)">Task successfully classified and resolved during previous step.</p>
                    </div>
                `;
            } else {
                // Future item
                const m = UI_MOCK_EMAILS[selectedIdx];
                mainEl.innerHTML = `
                    <div class="mail-header">
                        <h2 class="mail-subject">${m.subj}</h2>
                        <div class="mail-meta-row"><span><strong>From:</strong> ${m.sender}</span></div>
                    </div>
                    <div class="empty-preview" style="height:200px">
                        <p>This email is locked. Process earlier emails to reach this step.</p>
                    </div>
                `;
                insEl.innerHTML = ``;
            }

            if (envState && envState.emails_remaining === 0) {
                 mainEl.innerHTML = `
                    <div class="empty-preview">
                        <h3>🎉 Inbox Zero</h3>
                        <p>All emails for this difficulty dataset have been processed.</p>
                        <br/>
                        <button class="btn btn-primary" style="background:var(--primary)" onclick="resetEnv()">Run Different Dataset</button>
                    </div>
                `;
                 insEl.innerHTML = ``;
            }
        }

        function setLoading(isLoading) {
            document.getElementById('spinner').style.display = isLoading ? 'block' : 'none';
        }

        window.onload = init;
    </script>
</body>
</html>
