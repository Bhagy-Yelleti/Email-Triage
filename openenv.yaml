name: openenv-email-triage-v1
version: "1.0.0"
description: Deterministic real-world email triage environment with dense rewards and task graders.
entrypoint: src.app:app
runtime:
  container_port: 7860
  healthcheck_path: /health
metadata:
  domain: customer-operations
  category: real-world-task
  difficulty_levels:
    - easy
    - medium
    - hard
api:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
tasks:
  - id: email-easy-001
    difficulty: easy
  - id: email-medium-001
    difficulty: medium
  - id: email-hard-001
    difficulty: hard
